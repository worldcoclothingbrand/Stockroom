<!DOCTYPE html>
<html>
<head>
  <title>Redacted</title>
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; background: black; }
    video { width: 100vw; height: 100vh; object-fit: cover; }
    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      color: lime;
      font-size: 16px;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 99;
    }
  </style>
</head>
<body>

<video id="camera" autoplay playsinline></video>
<div id="debug">Starting...</div>

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {

    const SECRET_HASH = "8a9c830e229a30c1e6cad662c66b3ea091cef9908d95c709ddf7bb42b1874435";
    const debug = document.getElementById("debug");

    async function hashString(str) {
      const msgBuffer = new TextEncoder().encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(null, 'camera', (result, err) => {
      if (result) {
        debug.textContent = "Barcode found: " + result.getText();
        hashString(result.getText()).then(hash => {
          if (hash === SECRET_HASH) {
            codeReader.reset();
            window.location.href = "inventory.html";
          } else {
            debug.textContent = "Wrong code: " + result.getText();
          }
        });
      } else if (err && !(err instanceof ZXing.NotFoundException)) {
        debug.textContent = "Error: " + err.message;
      } else {
        debug.textContent = "Camera on. Show barcode...";
      }
    });

  });
</script>

</body>
</html>
